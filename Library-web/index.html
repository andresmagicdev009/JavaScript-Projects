<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Biblioteca</h1>

    <button command="show-modal" commandFor="my-modal">Agregar Libro</button>


    <div>
        <h1>Panel de Estadisticas y Filtros</h1>
        <div id="stats-panel">
            <p>Libros Totales: <span id="total-books">0</span></p>
            <p>Libros Leidos: <span id="read-books">0</span></p>
            <p>Libros no Leidos: <span id="unread-books">0</span></p>
        </div>
        <div id="filter-controls">
            <button class="filter-btn" data-filter="all">Todos</button>
            <button class="filter-btn" data-filter="read">Leidos</button>
            <button class="filter-btn" data-filter="unread">No Leidos</button>
        </div> 
    </div>

    <dialog id="my-modal">
        <div>
            <h1>Agregar Libro</h1>
            <button command="close" commandFor="my-modal">X</button>
        </div>

        <form id="book-form">
            <input type="text" id="title" placeholder="Título">
            <input type="text" id="author" placeholder="Autor">
            <input type="number" id="pages" placeholder="Páginas">
            
            <input type="checkbox" id="read">
            <label for="read">Leído</label>
            <button type="submit">Agregar Libro</button>
        </form>
    </dialog>

    <div id="library"></div>
    <script src="Book.js"></script>
</body>

</html>
